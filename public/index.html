<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FunnelTrack</title>
  <style>
    :root {
      --bg:#0a0e1a;--s1:#111827;--s2:#1a2236;--s3:#222d42;--bd:#1f2b3d;
      --t1:#e2e8f0;--t2:#94a3b8;--t3:#64748b;
      --blue:#3b82f6;--green:#22c55e;--purple:#a855f7;--amber:#f59e0b;
      --rose:#f43f5e;--cyan:#06b6d4;--r:12px;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--t1);min-height:100vh}
    .shell{display:flex;min-height:100vh}
    .sb{width:210px;background:var(--s1);border-right:1px solid var(--bd);padding:20px 0;flex-shrink:0;position:fixed;height:100vh;overflow-y:auto;z-index:10}
    .sb .logo{padding:0 16px 20px;font-size:15px;font-weight:700;letter-spacing:-.3px}.logo span{color:var(--blue)}
    .ni{display:flex;align-items:center;gap:8px;padding:9px 16px;font-size:13px;color:var(--t2);cursor:pointer;transition:all .15s;border-left:3px solid transparent}
    .ni:hover{color:var(--t1);background:var(--s2)}.ni.a{color:var(--t1);background:var(--s2);border-left-color:var(--blue)}
    .ni svg{width:15px;height:15px;opacity:.6}.ni.a svg{opacity:1}
    .sep{height:1px;background:var(--bd);margin:10px 16px}
    .mn{margin-left:210px;flex:1;padding:24px 28px;max-width:1140px}
    .ph{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px}
    .ph h1{font-size:20px;font-weight:700;letter-spacing:-.3px}
    .btn{padding:6px 12px;border-radius:7px;border:1px solid var(--bd);background:var(--s1);color:var(--t2);font-size:11px;font-weight:500;cursor:pointer;transition:all .15s}
    .btn:hover{background:var(--s2);color:var(--t1)}.btn-p{background:var(--blue);color:#fff;border-color:var(--blue)}.btn-p:hover{opacity:.9}
    .card{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:18px}
    .grid{display:grid;gap:12px;margin-bottom:20px}
    .g2{grid-template-columns:1fr 1fr}.g3{grid-template-columns:1fr 1fr 1fr}.g4{grid-template-columns:repeat(auto-fit,minmax(150px,1fr))}.g5{grid-template-columns:repeat(auto-fit,minmax(130px,1fr))}
    .st .lb{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.7px;font-weight:600}
    .st .vl{font-size:26px;font-weight:700;margin-top:3px;line-height:1}
    .st .sb2{font-size:10px;color:var(--t3);margin-top:3px}
    .fb{display:flex;align-items:center;gap:0;margin-bottom:20px;overflow-x:auto}
    .fb .step{text-align:center;flex:1;min-width:80px}.fb .step .v{font-size:20px;font-weight:700}.fb .step .l{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
    .fb .arr{color:var(--t3);font-size:11px;padding:0 4px;text-align:center}.fb .arr .rt{color:var(--amber);font-weight:600;font-size:10px}
    .tc{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;margin-bottom:20px}
    .tc h3{font-size:12px;font-weight:600;color:var(--t2);padding:14px 16px 0}
    table{width:100%;border-collapse:collapse}
    th{text-align:left;padding:8px 16px;font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.7px;font-weight:600;border-bottom:1px solid var(--bd)}
    td{padding:8px 16px;font-size:12px;border-bottom:1px solid var(--bd)}
    tr:last-child td{border-bottom:none}tr:hover td{background:rgba(59,130,246,.03)}
    .tg{display:inline-block;padding:1px 7px;border-radius:5px;font-size:10px;font-weight:600}
    .tg-b{background:rgba(59,130,246,.12);color:#60a5fa}.tg-g{background:rgba(34,197,94,.12);color:#4ade80}
    .tg-p{background:rgba(168,85,247,.12);color:#c084fc}.tg-a{background:rgba(245,158,11,.12);color:#fbbf24}
    .tg-r{background:rgba(244,63,94,.12);color:#fb7185}.tg-c{background:rgba(6,182,212,.12);color:#22d3ee}
    .grade{display:inline-block;width:24px;height:24px;border-radius:6px;text-align:center;line-height:24px;font-size:11px;font-weight:700}
    .grade-A{background:rgba(34,197,94,.15);color:#4ade80}.grade-B{background:rgba(59,130,246,.15);color:#60a5fa}
    .grade-C{background:rgba(245,158,11,.15);color:#fbbf24}.grade-D{background:rgba(100,116,139,.15);color:#94a3b8}
    .mc{display:flex;align-items:flex-end;gap:1px}.mc .b{flex:1;border-radius:2px 2px 0 0;min-width:2px;transition:opacity .15s;position:relative;display:flex;align-items:flex-start;justify-content:center}
    .mc .b:hover{opacity:.8}.mc .b .bv{font-size:8px;color:rgba(255,255,255,.85);font-weight:600;margin-top:2px}
    .cf{display:flex;justify-content:space-between;font-size:9px;color:var(--t3);margin-top:3px}
    th.sort{cursor:pointer;user-select:none}th.sort:hover{color:var(--t1)}th.sort::after{content:'';margin-left:3px}th.sort.asc::after{content:' \u25B2'}th.sort.desc::after{content:' \u25BC'}
    .dr{display:flex;gap:4px;margin-bottom:16px}.dr button{padding:5px 12px;font-size:11px;font-weight:600;border:1px solid var(--bd);border-radius:6px;background:var(--card);color:var(--t2);cursor:pointer;transition:all .15s}.dr button.active{background:var(--blue);color:#fff;border-color:var(--blue)}.dr button:hover:not(.active){background:var(--s2)}
    .today-card{background:linear-gradient(135deg,rgba(59,130,246,.08),rgba(34,197,94,.08));border:1px solid rgba(59,130,246,.2);border-radius:var(--r);padding:14px 18px;margin-bottom:16px;display:flex;gap:20px;align-items:center;flex-wrap:wrap}
    .today-card .td-item{text-align:center;flex:1;min-width:80px}.today-card .td-val{font-size:22px;font-weight:700}.today-card .td-lb{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
    .cc{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:16px;margin-bottom:20px}
    .cc h3{font-size:12px;font-weight:600;color:var(--t2);margin-bottom:10px}
    .vr{display:flex;gap:12px;align-items:center;padding:10px 16px;border-bottom:1px solid var(--bd)}
    .vr:last-child{border-bottom:none}.vr:hover{background:rgba(59,130,246,.03)}
    .vr img{width:110px;height:62px;border-radius:5px;object-fit:cover;flex-shrink:0}
    .vr .vi{flex:1;min-width:0}.vr .vt{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .vr .vt a{color:var(--t1);text-decoration:none}.vr .vt a:hover{color:var(--blue)}
    .vr .vm{display:flex;gap:12px;margin-top:3px;font-size:10px;color:var(--t3)}.vr .vm b{color:var(--t2);font-weight:600}
    .em{text-align:center;padding:24px;color:var(--t3);font-size:12px}
    .fg label{display:block;font-size:10px;color:var(--t3);margin:10px 0 3px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
    .fg label:first-child{margin-top:0}
    .fg input,.fg select{width:100%;padding:8px 12px;border-radius:7px;border:1px solid var(--bd);background:var(--bg);color:var(--t1);font-size:13px}
    .fg select{appearance:auto}
    .uo{margin-top:14px;padding:12px 44px 12px 12px;background:var(--bg);border-radius:7px;border:1px solid var(--bd);font-family:monospace;font-size:12px;word-break:break-all;color:var(--green);position:relative}
    .cpb{position:absolute;top:8px;right:8px;padding:3px 8px;border-radius:5px;border:1px solid var(--bd);background:var(--s1);color:var(--t2);font-size:10px;cursor:pointer}
    .cpb:hover{background:var(--s2)}.cpb.ok{background:rgba(34,197,94,.15);color:var(--green);border-color:rgba(34,197,94,.2)}
    .hi{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;background:var(--bg);border-radius:5px;margin-bottom:3px;font-size:11px;border:1px solid var(--bd)}
    .hi .hc{color:var(--purple);font-weight:600;min-width:100px}.hi .hl{color:var(--t3);font-family:monospace;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin:0 10px}
    .erow{display:flex;gap:16px;align-items:center;padding:10px 16px;border-bottom:1px solid var(--bd)}
    .erow:last-child{border-bottom:none}.erow:hover{background:rgba(59,130,246,.03)}
    .erow .ename{font-size:13px;font-weight:600;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .erow .estats{display:flex;gap:16px;font-size:11px;color:var(--t3)}.erow .estats b{color:var(--t2)}
    .bar-h{display:flex;align-items:center;gap:6px;font-size:11px}
    .bar-track{flex:1;height:6px;background:var(--s3);border-radius:3px;overflow:hidden}
    .bar-fill{height:100%;border-radius:3px}
    .af{max-width:340px}.af{margin:100px auto;background:var(--s1);padding:28px;border-radius:var(--r);border:1px solid var(--bd)}
    .af h2{margin-bottom:14px;text-align:center;font-size:17px}
    .af input{width:100%;padding:9px 12px;border-radius:7px;border:1px solid var(--bd);background:var(--bg);color:var(--t1);font-size:13px;margin-bottom:10px}
    .af button{width:100%}.ld{text-align:center;padding:50px;color:var(--t3)}.er{text-align:center;padding:50px;color:var(--rose)}
    @media(max-width:768px){.sb{display:none}.mn{margin-left:0;padding:14px}.g2,.g3{grid-template-columns:1fr}.vr img{width:70px;height:40px}}
  </style>
</head>
<body>
<div id="app"><div class="ld">Loading...</div></div>
<script>
const A=window.location.origin;
let S=localStorage.getItem('ds')||new URLSearchParams(location.search).get('secret')||'';
if(S)localStorage.setItem('ds',S);
let T='overview';
let CH=localStorage.getItem('ft_channel')||'default';
let channelList=[];

function qs(s){
  let r=s;
  if(S)r+=`${r.includes('?')?'&':'?'}secret=${encodeURIComponent(S)}`;
  if(CH&&CH!=='default')r+=`${r.includes('?')?'&':'?'}channel=${encodeURIComponent(CH)}`;
  return r;
}
async function af(p){const r=await fetch(qs(`${A}${p}`));if(r.status===401){showAuth();throw new Error('auth')}if(!r.ok)throw new Error(r.status);return r.json()}
async function loadChannels(){try{channelList=await af('/api/dashboard/channels')}catch(e){channelList=[{id:'default',name:'Default Channel'}];if(e.message==='auth')return}}
function switchChannel(id){CH=id;localStorage.setItem('ft_channel',id);go(T)}
function showAuth(){document.getElementById('app').innerHTML=`<div class="af"><h2>FunnelTrack</h2><input type="password" id="si" placeholder="Enter secret" autofocus /><button class="btn btn-p" onclick="doA()">Unlock</button></div>`;document.getElementById('si').addEventListener('keydown',e=>{if(e.key==='Enter')doA()})}
function doA(){S=document.getElementById('si').value;localStorage.setItem('ds',S);go('overview')}

const I={
  ov:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>',
  yt:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22.54 6.42a2.78 2.78 0 00-1.94-2C18.88 4 12 4 12 4s-6.88 0-8.6.46a2.78 2.78 0 00-1.94 2A29 29 0 001 11.75a29 29 0 00.46 5.33A2.78 2.78 0 003.4 19.1c1.72.46 8.6.46 8.6.46s6.88 0 8.6-.46a2.78 2.78 0 001.94-2 29 29 0 00.46-5.25 29 29 0 00-.46-5.33z"/><polygon points="9.75 15.02 15.5 11.75 9.75 8.48" fill="currentColor" stroke="none"/></svg>',
  em:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>',
  sc:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>',
  co:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>',
  ac:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>',
  ln:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>',
};

function chPicker(){
  if(channelList.length<=1)return'';
  const opts=channelList.map(c=>`<option value="${c.id}" ${c.id===CH?'selected':''}>${c.name}</option>`).join('');
  return`<div style="padding:6px 12px 10px"><select onchange="switchChannel(this.value)" style="width:100%;padding:6px 8px;border-radius:6px;border:1px solid var(--bd);background:var(--bg);color:var(--t1);font-size:11px;font-weight:600">${opts}</select></div>`;
}
function sh(c){return`<div class="shell"><div class="sb"><div class="logo">Funnel<span>Track</span></div>
${chPicker()}
<div class="ni ${T==='overview'?'a':''}" onclick="go('overview')">${I.ov} Overview</div>
<div class="ni ${T==='youtube'?'a':''}" onclick="go('youtube')">${I.yt} YouTube</div>
<div class="ni ${T==='vsl'?'a':''}" onclick="go('vsl')">${I.ac} VSL</div>
<div class="ni ${T==='emails'?'a':''}" onclick="go('emails')">${I.em} Emails</div>
<div class="ni ${T==='scoring'?'a':''}" onclick="go('scoring')">${I.sc} Quality Score</div>
<div class="ni ${T==='costs'?'a':''}" onclick="go('costs')">${I.co} Costs & ROI</div>
<div class="sep"></div>
<div class="ni ${T==='activity'?'a':''}" onclick="go('activity')">${I.ac} Activity</div>
<div class="ni ${T==='links'?'a':''}" onclick="go('links')">${I.ln} UTM Links</div>
<div class="ni ${T==='settings'?'a':''}" onclick="go('settings')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg> Settings</div>
</div><div class="mn">${c}</div></div>`}

function go(t){T=t;const m={overview:pOv,youtube:pYt,vsl:pVsl,emails:pEm,scoring:pSc,costs:pCo,activity:pAc,links:pLn,settings:pSt};(m[t]||pOv)()}
function N(n){if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(1)+'K';return n.toLocaleString()}
function $(n){return'$'+n.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}
function P(a,b){return b>0?((a/b)*100).toFixed(1)+'%':'0%'}
function mc(d,k,col,h=120){if(!d.length)return'<div class="mc" style="justify-content:center;color:var(--t3);font-size:11px;height:'+h+'px">No data yet</div>';const mx=Math.max(...d.map(x=>x[k]),1);const total=d.reduce((a,x)=>a+x[k],0);const yLabels=`<div style="display:flex;flex-direction:column;justify-content:space-between;align-items:flex-end;padding:2px 0;height:${h}px;font-size:9px;color:var(--t3);min-width:30px"><span>${N(mx)}</span><span>${N(Math.round(mx/2))}</span><span>0</span></div>`;return`<div style="display:flex;gap:6px">${yLabels}<div style="flex:1"><div class="mc" style="height:${h}px">${d.map(x=>`<div class="b" style="height:${Math.max(x[k]/mx*100,2)}%;background:${col}" title="${x.day||x.week}: ${x[k]}"><span class="bv">${x[k]>0&&x[k]>=mx*0.3?x[k]:''}</span></div>`).join('')}</div><div class="cf"><span>${d[0].day||d[0].week||''}</span><span>Total: ${N(total)}</span><span>${d[d.length-1].day||d[d.length-1].week||''}</span></div></div></div>`}
function bar(val,max,col){const w=max>0?Math.max(val/max*100,1):0;return`<div class="bar-h"><div class="bar-track"><div class="bar-fill" style="width:${w}%;background:${col}"></div></div><span>${val.toFixed(1)}%</span></div>`}
function cp(t,b){navigator.clipboard.writeText(t).then(()=>{const o=b.textContent;b.textContent='Copied!';b.classList.add('ok');setTimeout(()=>{b.textContent=o;b.classList.remove('ok')},1400)})}

// ============ OVERVIEW ============
let ovDays=30;let ovData=null;let campSort='subscribers';let campDir='desc';
async function pOv(days){
  if(days!==undefined)ovDays=days;
  document.getElementById('app').innerHTML=sh('<div class="ld">Loading...</div>');
  try{
    const dp=ovDays>0?'days='+ovDays:'';
    const[s,ch,f,td,ff]=await Promise.all([
      af('/api/dashboard/stats'+(dp?'?'+dp:'')),
      af('/api/dashboard/charts?'+(dp||'days=30')),
      af('/api/dashboard/funnel'+(dp?'?'+dp:'')),
      af('/api/dashboard/today'),
      af('/api/dashboard/funnel-flow?'+(dp||'days=30')),
    ]);
    ovData={s,ch,f,td,ff};
    rOv();
  }catch(e){if(e.message!=='auth')document.querySelector('.mn').innerHTML=`<div class="er">${e.message}</div>`}
}
function sortCamp(col){if(campSort===col)campDir=campDir==='desc'?'asc':'desc';else{campSort=col;campDir='desc';}rOv();}
function rOv(){
  if(!ovData)return;
  const{s,ch,f,td,ff}=ovData;
  const or=P(s.totalSubscribers,s.totalPageviews),br=P(s.totalPurchases,s.totalSubscribers);
  const fc=[...(f.campaigns||[])];
  const getVal=(c,k)=>{switch(k){case'campaign':return c.campaign;case'source':return c.source;case'pageviews':return c.pageviews||0;case'subscribers':return c.subscribers;case'buyers':return c.buyers;case'revenue':return c.revenue;case'revenuePerSub':return c.revenuePerSub||0;case'conversionRate':return parseFloat(c.conversionRate)||0;default:return 0}};
  fc.sort((a,b)=>{const av=getVal(a,campSort),bv=getVal(b,campSort);const cmp=typeof av==='string'?av.localeCompare(bv):av-bv;return campDir==='desc'?-cmp:cmp;});
  const srt=(col)=>`class="sort${campSort===col?(' '+(campDir)):''}" onclick="sortCamp('${col}')"`;
  const cr=fc.length>0?fc.map(c=>{
    const roi=c.roi!==null&&c.roi!==undefined?`<span class="tg ${c.roi>=0?'tg-g':'tg-r'}">${c.roi>=0?'+':''}${c.roi}%</span>`:'<span style="color:var(--t3)">-</span>';
    return`<tr><td><span class="grade grade-${c.grade}">${c.grade}</span></td><td><span class="tg tg-p">${c.campaign}</span></td><td><span class="tg tg-b">${c.source}</span></td><td>${N(c.pageviews||0)}</td><td>${c.subscribers}</td><td>${c.buyers}</td><td>${$(c.revenue)}</td><td>${$(c.revenuePerSub||0)}</td><td>${roi}</td><td>${c.conversionRate}</td></tr>`
  }).join(''):'<tr><td colspan="10" class="em">No campaign data yet</td></tr>';

  const drBtn=(d,lbl)=>`<button class="${ovDays===d?'active':''}" onclick="pOv(${d})">${lbl}</button>`;
  const lbl=ovDays===0?'All time':ovDays===1?'Today':ovDays+'d';

  document.querySelector('.mn').innerHTML=`
    <div class="ph"><h1>Overview</h1>
      <div style="display:flex;align-items:center;gap:8px">
        <div class="dr" style="margin:0">${drBtn(1,'Today')}${drBtn(7,'7d')}${drBtn(30,'30d')}${drBtn(90,'90d')}${drBtn(0,'All')}</div>
        <button class="btn" onclick="pOv()">Refresh</button>
      </div>
    </div>

    <div class="card" style="padding:0;overflow:hidden;margin-bottom:24px">
      <div style="display:grid;grid-template-columns:1fr auto 1fr auto 1fr auto 1fr auto 1fr auto 1fr;align-items:center;padding:20px 12px">
        <div style="text-align:center">
          <div style="font-size:28px;font-weight:800;color:var(--blue)">${N(ff.pageVisits)}</div>

// ============ YOUTUBE ============
async function pYt(){
  document.getElementById('app').innerHTML=sh('<div class="ld">Loading YouTube...</div>');
  try{const d=await af('/api/dashboard/youtube');rYt(d)}catch(e){if(e.message!=='auth')document.querySelector('.mn').innerHTML=`<div class="er">${e.message}</div>`}
}
let ytData=null;let ytSort='views';let ytFilter='all';let ytSearch='';
function rYt(d){
  ytData=d;
  renderYtPage();
}
function renderYtPage(){
  if(!ytData)return;
  const d=ytData;
  const c=d.channel;
  const totalOptins=(d.videos||[]).reduce((a,v)=>a+(v.funnel?.subscribers||0),0);
  const totalRev=(d.videos||[]).reduce((a,v)=>a+(v.funnel?.revenue||0),0);
  const trackedCount=(d.videos||[]).filter(v=>v.funnel?.campaign).length;
  const cs=c?`<div class="grid g5">
    <div class="card st"><div class="lb">YT Subscribers</div><div class="vl" style="color:var(--rose)">${N(c.subscriberCount)}</div></div>
    <div class="card st"><div class="lb">Total Views</div><div class="vl" style="color:var(--blue)">${N(c.viewCount)}</div></div>
    <div class="card st"><div class="lb">Videos</div><div class="vl" style="color:var(--purple)">${(d.videos||[]).length} <span style="font-size:11px;color:var(--t3)">/ ${trackedCount} tracked</span></div></div>
    <div class="card st"><div class="lb">Funnel Opt-ins</div><div class="vl" style="color:var(--green)">${totalOptins}</div></div>
    <div class="card st"><div class="lb">Funnel Revenue</div><div class="vl" style="color:var(--amber)">${$(totalRev)}</div></div>
  </div>`:'';

  // Filter videos
  let vids=[...(d.videos||[])];
  if(ytSearch){const q=ytSearch.toLowerCase();vids=vids.filter(v=>v.title.toLowerCase().includes(q))}
  if(ytFilter==='tracked')vids=vids.filter(v=>v.funnel?.campaign);
  if(ytFilter==='untracked')vids=vids.filter(v=>!v.funnel?.campaign);
  if(ytFilter==='with-optins')vids=vids.filter(v=>(v.funnel?.subscribers||0)>0);

  // Sort videos
  if(ytSort==='views')vids.sort((a,b)=>b.views-a.views);
  if(ytSort==='clicks')vids.sort((a,b)=>(b.funnel?.clicks||0)-(a.funnel?.clicks||0));
  if(ytSort==='optins')vids.sort((a,b)=>(b.funnel?.subscribers||0)-(a.funnel?.subscribers||0));
  if(ytSort==='revenue')vids.sort((a,b)=>(b.funnel?.revenue||0)-(a.funnel?.revenue||0));
  if(ytSort==='date')vids.sort((a,b)=>new Date(b.publishedAt).getTime()-new Date(a.publishedAt).getTime());

  const controls=`<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center">
    <input type="text" placeholder="Search videos..." value="${ytSearch}" oninput="ytSearch=this.value;renderYtPage()" style="flex:1;min-width:200px;padding:8px 12px;background:var(--card);border:1px solid var(--bd);border-radius:6px;color:var(--t1);font-size:13px"/>
    <select onchange="ytSort=this.value;renderYtPage()" style="padding:8px 12px;background:var(--card);border:1px solid var(--bd);border-radius:6px;color:var(--t1);font-size:13px">
      <option value="views"${ytSort==='views'?' selected':''}>Sort: Views</option>
      <option value="clicks"${ytSort==='clicks'?' selected':''}>Sort: Clicks</option>
      <option value="optins"${ytSort==='optins'?' selected':''}>Sort: Opt-ins</option>
      <option value="revenue"${ytSort==='revenue'?' selected':''}>Sort: Revenue</option>
      <option value="date"${ytSort==='date'?' selected':''}>Sort: Newest</option>
    </select>
    <select onchange="ytFilter=this.value;renderYtPage()" style="padding:8px 12px;background:var(--card);border:1px solid var(--bd);border-radius:6px;color:var(--t1);font-size:13px">
      <option value="all"${ytFilter==='all'?' selected':''}>All (${(d.videos||[]).length})</option>
      <option value="tracked"${ytFilter==='tracked'?' selected':''}>Tracked (${trackedCount})</option>
      <option value="untracked"${ytFilter==='untracked'?' selected':''}>No UTM (${(d.videos||[]).length-trackedCount})</option>
      <option value="with-optins"${ytFilter==='with-optins'?' selected':''}>With Opt-ins</option>
    </select>
  </div>`;

  const vs=vids.map(v=>{
    const f=v.funnel||{};
    const linked=f.campaign?`<span class="tg tg-g" style="font-size:9px">Tracked</span>`:`<span class="tg" style="background:rgba(100,116,139,.1);color:var(--t3);font-size:9px">No UTM</span>`;
    return`<div class="vr" style="gap:14px;padding:14px 16px">
      <img src="${v.thumbnail}" loading="lazy" style="width:140px;height:79px;border-radius:6px"/>
      <div class="vi" style="flex:1">
        <div style="display:flex;align-items:center;gap:8px">
          <div class="vt" style="flex:1"><a href="https://youtube.com/watch?v=${v.videoId}" target="_blank">${v.title}</a></div>
          ${linked}
        </div>
        <div style="display:flex;gap:0;margin-top:8px">
          <div style="flex:1;text-align:center;padding:6px 0;background:var(--bg);border-radius:6px 0 0 6px;border:1px solid var(--bd)">
            <div style="font-size:16px;font-weight:700;color:var(--blue)">${N(v.views)}</div>
            <div style="font-size:9px;color:var(--t3);text-transform:uppercase">Views</div>
          </div>
          <div style="flex:1;text-align:center;padding:6px 0;background:var(--bg);border:1px solid var(--bd);border-left:0">
            <div style="font-size:16px;font-weight:700;color:var(--cyan)">${N(f.clicks||0)}</div>
            <div style="font-size:9px;color:var(--t3);text-transform:uppercase">Clicks</div>
          </div>
          <div style="flex:1;text-align:center;padding:6px 0;background:var(--bg);border:1px solid var(--bd);border-left:0">
            <div style="font-size:16px;font-weight:700;color:var(--green)">${f.subscribers||0}</div>
            <div style="font-size:9px;color:var(--t3);text-transform:uppercase">Opt-ins</div>
          </div>
          <div style="flex:1;text-align:center;padding:6px 0;background:var(--bg);border:1px solid var(--bd);border-left:0">
            <div style="font-size:16px;font-weight:700;color:var(--purple)">${f.buyers||0}</div>
            <div style="font-size:9px;color:var(--t3);text-transform:uppercase">Sales</div>
          </div>
          <div style="flex:1;text-align:center;padding:6px 0;background:var(--bg);border-radius:0 6px 6px 0;border:1px solid var(--bd);border-left:0">
            <div style="font-size:16px;font-weight:700;color:var(--amber)">${$(f.revenue||0)}</div>
            <div style="font-size:9px;color:var(--t3);text-transform:uppercase">Revenue</div>
          </div>
        </div>
        <div class="vm" style="margin-top:6px"><span><b>${N(v.likes)}</b> likes</span><span><b>${N(v.comments)}</b> comments</span><span>${new Date(v.publishedAt).toLocaleDateString()}</span>${f.optinRate>0?`<span style="color:var(--green)"><b>${f.optinRate}%</b> opt-in rate</span>`:''}</div>
      </div>
    </div>`}).join('')||'<div class="em">No videos match your filter</div>';

  document.querySelector('.mn').innerHTML=`<div class="ph"><h1>YouTube &rarr; Funnel</h1><button class="btn" onclick="go('youtube')">Refresh</button></div>${cs}${controls}<div class="tc"><h3>Video Performance <span style="font-size:12px;color:var(--t3)">(${vids.length} videos)</span></h3>${vs}</div>`;
}

function rVsl(vs,cs){
  function mBar(label,val,max,col){
    const w=max>0?Math.max(val/max*100,1):0;
    const pct=max>0?((val/max)*100).toFixed(1)+'%':'0%';
    return`<div style="display:flex;align-items:center;gap:12px;margin-bottom:8px">
      <div style="width:70px;font-size:11px;color:var(--t3);text-align:right">${label}</div>

        <div style="height:100%;width:${w}%;background:${col};border-radius:4px;transition:width .3s"></div>
        <span style="position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:11px;font-weight:600;color:var(--t1)">${val} visitors (${pct})</span>
      </div>
    </div>`;
  }

  const base=vs.uniqueVisitors||vs.totalVisits||1;
  const milestones=mBar('Started',base,base,'var(--blue)')+
    mBar('25%',vs.watch25,base,'var(--green)')+
    mBar('50%',vs.watch50,base,'var(--cyan)')+
    mBar('75%',vs.watch75,base,'var(--purple)')+

    <div class="ph"><h1>VSL Performance</h1><button class="btn" onclick="go('vsl')">Refresh</button></div>

      </div>
      <div style="background:var(--s1);padding:20px;text-align:center">
        <div style="font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Watched 100%</div>
        <div style="font-size:30px;font-weight:800;color:var(--amber);line-height:1">${N(vs.watchComplete)}</div>
        <div style="font-size:11px;color:var(--t3);margin-top:4px">${base>0?((vs.watchComplete/base)*100).toFixed(1):'0'}% of visitors</div>
      </div>
      <div style="background:var(--s1);padding:20px;text-align:center">
        <div style="font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">CTA Clicks</div>
        <div style="font-size:30px;font-weight:800;color:var(--green);line-height:1">${N(vs.ctaClicks)}</div>
        <div style="font-size:11px;color:var(--green);margin-top:4px;font-weight:600">${vs.ctaRate}% click rate</div>
      </div>
      <div style="background:var(--s1);padding:20px;text-align:center">
        <div style="font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Purchases</div>
        <div style="font-size:30px;font-weight:800;color:var(--rose);line-height:1">${N(cs.completedPurchases)}</div>
        <div style="font-size:11px;color:var(--t3);margin-top:4px">${$(cs.revenue)} revenue</div>
      </div>
    </div>

    <div class="card" style="margin-bottom:24px">
      <h3 style="font-size:12px;font-weight:600;color:var(--t2);margin-bottom:16px">Watch Milestones</h3>
      ${vs.totalVisits>0?milestones:'<div class="em">No VSL data yet. Milestones will appear once visitors watch your sales video.</div>'}
    </div>

    <div class="card" style="margin-bottom:24px">
      <h3 style="font-size:12px;font-weight:600;color:var(--t2);margin-bottom:16px">Checkout Funnel</h3>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px">
        <div style="text-align:center;padding:16px;background:var(--bg);border-radius:8px">
          <div style="font-size:24px;font-weight:700;color:var(--amber)">${N(cs.checkoutStarts)}</div>

  const fc=f.campaigns||[];
  const roi=fc.filter(c=>c.spend>0).map(c=>`<tr>
    <td><span class="tg tg-p">${c.campaign}</span></td>
    <td>${$(c.spend)}</td>
    <td>${$(c.revenue)}</td>
    <td>${$(c.revenue-c.spend)}</td>
    <td><span class="tg ${c.roi>=0?'tg-g':'tg-r'}">${c.roi>=0?'+':''}${c.roi}%</span></td>
    <td>${c.subscribers}</td>
    <td>${$(c.spend>0&&c.subscribers>0?c.spend/c.subscribers:0)}</td>
  </tr>`).join('')||'<tr><td colspan="7" class="em">No costs tracked yet. Add a cost below.</td></tr>';
  const eh=entries.length>0?entries.map(e=>`<tr><td><span class="tg tg-p">${e.campaign}</span></td><td>${$(e.amount)}</td><td>${e.description||'-'}</td><td>${e.date}</td></tr>`).join(''):'<tr><td colspan="4" class="em">No entries</td></tr>';
  document.querySelector('.mn').innerHTML=`<div class="ph"><h1>Costs & ROI</h1><button class="btn" onclick="go('costs')">Refresh</button></div>
  <div class="tc"><h3>ROI by Campaign</h3><table><thead><tr><th>Campaign</th><th>Spend</th><th>Revenue</th><th>Profit</th><th>ROI</th><th>Subs</th><th>Cost/Sub</th></tr></thead><tbody>${roi}</tbody></table></div>
  <div class="grid g2">
    <div class="card fg">
      <h3 style="font-size:13px;font-weight:600;color:var(--t2);margin-bottom:10px">Add Cost</h3>
      <label>Campaign</label><input type="text" id="cc" placeholder="e.g. revision-technique"/>
      <label>Amount ($)</label><input type="number" id="ca" placeholder="50.00" step="0.01"/>
      <label>Description</label><input type="text" id="cd" placeholder="YouTube ad spend"/>
      <label>Date</label><input type="date" id="cdt" value="${new Date().toISOString().split('T')[0]}"/>
      <button class="btn btn-p" style="margin-top:12px;width:100%" onclick="addCost()">Add Cost</button>
    </div>
    <div class="tc"><h3>Recent Entries</h3><table><thead><tr><th>Campaign</th><th>Amount</th><th>Note</th><th>Date</th></tr></thead><tbody>${eh}</tbody></table></div>
  </div>`;
}
async function addCost(){
  const c=document.getElementById('cc').value.trim();
  const a=document.getElementById('ca').value;
  const d=document.getElementById('cd').value;
  const dt=document.getElementById('cdt').value;
  if(!c||!a){alert('Campaign and amount required');return}
  await fetch(qs(`${A}/api/dashboard/costs`),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({campaign:c,amount:parseFloat(a),description:d,date:dt})});
  go('costs');
}

// ============ ACTIVITY ============
async function pAc(){
  document.getElementById('app').innerHTML=sh('<div class="ld">Loading...</div>');
  try{const d=await af('/api/dashboard/activity');rAc(d)}catch(e){if(e.message!=='auth')document.querySelector('.mn').innerHTML=`<div class="er">${e.message}</div>`}
}
function rAc(d){
  const rows=d.length>0?d.map(a=>{const c=a.event==='optin_submit'?'tg-g':a.event==='purchase'?'tg-a':'tg-b';return`<tr><td><span class="tg ${c}">${a.event}</span></td><td style="font-family:monospace;font-size:11px">${a.visitor}</td><td>${a.email||'-'}</td><td style="color:var(--t3);font-size:11px">${new Date(a.time+'Z').toLocaleString()}</td></tr>`}).join(''):'<tr><td colspan="4" class="em">No events yet</td></tr>';
  document.querySelector('.mn').innerHTML=`<div class="ph"><h1>Activity</h1><button class="btn" onclick="go('activity')">Refresh</button></div>
  <div class="tc"><table><thead><tr><th>Event</th><th>Visitor</th><th>Email</th><th>Time</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}

// ============ UTM LINKS ============
const SITE='https://goddardsecrets.com/';
function gH(){try{return JSON.parse(localStorage.getItem('uh')||'[]')}catch{return[]}}
function sH(h){localStorage.setItem('uh',JSON.stringify(h.slice(0,25)))}
function pLn(){
  const h=gH();
  const hh=h.length>0?h.map(x=>`<div class="hi"><span class="hc">${x.c}</span><span class="hl">${x.u}</span><button class="btn" style="padding:2px 8px;font-size:10px" onclick="cp('${x.u}',this)">Copy</button></div>`).join(''):'<div style="color:var(--t3);font-size:12px;padding:6px 0">No links yet</div>';
  document.getElementById('app').innerHTML=sh(`<div class="ph"><h1>UTM Link Generator</h1></div>
  <div class="card fg" style="max-width:520px">
    <label>Campaign Name</label><input type="text" id="uc" placeholder="e.g. revision-technique" oninput="uP()"/>
    <label>Source</label><select id="us" onchange="uP()"><option value="youtube">YouTube</option><option value="instagram">Instagram</option><option value="tiktok">TikTok</option><option value="twitter">Twitter / X</option><option value="facebook">Facebook</option><option value="email">Email</option></select>
    <label>Medium</label><select id="um" onchange="uP()"><option value="">Auto</option><option value="organic">Organic</option><option value="paid">Paid</option><option value="description">Video description</option></select>
    <div class="uo" id="uo" style="display:none"><span id="uu"></span><button class="cpb" id="ucb" onclick="cpG()">Copy</button></div>
  </div>
  <div style="max-width:520px;margin-top:20px"><h3 style="font-size:12px;color:var(--t2);margin-bottom:6px">Recent Links</h3>${hh}</div>`);
}
function uP(){const c=document.getElementById('uc').value.trim().toLowerCase().replace(/[^a-z0-9-]/g,'-').replace(/-+/g,'-');const s=document.getElementById('us').value;const m=document.getElementById('um').value;if(!c){document.getElementById('uo').style.display='none';return}let u=SITE+'?utm_source='+s+'&utm_campaign='+c;if(m)u+='&utm_medium='+m;document.getElementById('uu').textContent=u;document.getElementById('uo').style.display='block';const h=gH();if(!h.find(x=>x.u===u)){h.unshift({c,s,u,t:Date.now()});sH(h)}}
function cpG(){cp(document.getElementById('uu').textContent,document.getElementById('ucb'))}

// ============ SETTINGS ============
async function pSt(){
  document.getElementById('app').innerHTML=sh('<div class="ld">Loading settings...</div>');
  try{const d=await af('/api/dashboard/settings');rSt(d)}catch(e){if(e.message!=='auth')document.querySelector('.mn').innerHTML=`<div class="er">${e.message}</div>`}
}
async function rSt(settings){
  const labels={
    'MAILERLITE_API_KEY':'MailerLite API Key',
    'MAILERLITE_GROUP_ID':'MailerLite Group ID',
    'STRIPE_SECRET_KEY':'Stripe Secret Key',
    'STRIPE_WEBHOOK_SECRET':'Stripe Webhook Secret',
    'STRIPE_PRODUCT_IDS':'Stripe Product IDs (comma-separated)',
    'YOUTUBE_API_KEY':'YouTube API Key',
    'YOUTUBE_CHANNEL_ID':'YouTube Channel ID',
    'DASHBOARD_SECRET':'Dashboard Password',
    'OPT_IN_URL':'Opt-in Page URL',
  };
  const descs={
    'STRIPE_PRODUCT_IDS':'Only track purchases for these products. Get IDs from Stripe → Products. Separate multiple with commas.',
    'MAILERLITE_GROUP_ID':'The group ID where new subscribers are added.',
    'YOUTUBE_CHANNEL_ID':'Starts with UC... — find it on your YouTube channel page.',
    'OPT_IN_URL':'Your landing page URL (e.g. goddardsecrets.com)',
  };
  const isSensitive=k=>k.includes('KEY')||k.includes('SECRET')||k.includes('TOKEN');

  const rows=settings.map(s=>{
    const sens=isSensitive(s.key);
    const src=s.source==='db'?'<span class="tg tg-g" style="font-size:9px">Dashboard</span>':s.source==='env'?'<span class="tg tg-b" style="font-size:9px">Vercel</span>':'<span class="tg" style="background:rgba(100,116,139,.1);color:var(--t3);font-size:9px">Not set</span>';
    const desc=descs[s.key]?`<div style="font-size:10px;color:var(--t3);margin-top:2px">${descs[s.key]}</div>`:'';
    return`<div style="padding:14px 16px;border-bottom:1px solid var(--bd)">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <div><span style="font-size:12px;font-weight:600">${labels[s.key]||s.key}</span> ${src}</div>
        <button class="btn" onclick="saveSetting('${s.key}')">Save</button>
      </div>
      ${desc}
      <input id="st_${s.key}" type="${sens?'password':'text'}" value="${sens?'':s.masked}" placeholder="${s.masked||'Not configured'}"
        style="width:100%;padding:8px 12px;border-radius:7px;border:1px solid var(--bd);background:var(--bg);color:var(--t1);font-size:12px;font-family:monospace;margin-top:4px"/>
    </div>`;
  }).join('');

  let chMgr='';
  try{chMgr=await loadChannelManager()}catch(e){}

  document.querySelector('.mn').innerHTML=`
    <div class="ph"><h1>Settings</h1><button class="btn" onclick="go('settings')">Refresh</button></div>
    <div style="font-size:12px;color:var(--t3);margin-bottom:16px">Configure API keys and product IDs. Settings saved here override Vercel environment variables.</div>
    <div class="card" style="padding:0;overflow:hidden">${rows}</div>
    ${chMgr}`;
}
async function saveSetting(key){
  const input=document.getElementById('st_'+key);
  const val=input.value.trim();
  if(!val){alert('Value cannot be empty');return}
  try{
    await fetch(qs(A+'/api/dashboard/settings'),{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({key,value:val})});
    input.style.borderColor='var(--green)';
    setTimeout(()=>{input.style.borderColor='var(--bd)'},1500);
    // Refresh to show updated source
    pSt();
  }catch(e){alert('Failed to save: '+e.message)}
}

// ============ CHANNELS MANAGEMENT (inside Settings) ============
async function loadChannelManager(){
  const chs=await af('/api/dashboard/channels');
  const rows=chs.map(c=>`<div style="display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--bd)">
    <span class="tg tg-b">${c.id}</span>
    <span style="flex:1;font-weight:600;font-size:13px">${c.name}</span>
    <span style="font-size:10px;color:var(--t3)">${c.opt_in_url||''}</span>
    ${c.id!=='default'?`<button class="btn" style="font-size:10px;color:var(--rose)" onclick="delCh('${c.id}')">Delete</button>`:''}
  </div>`).join('');
  return`<div class="tc" style="margin-top:24px"><h3>Channels</h3>
    ${rows}
    <div style="padding:14px 16px;display:flex;gap:8px">
      <input id="nch_id" placeholder="channel-slug" style="flex:1;padding:6px 10px;border-radius:6px;border:1px solid var(--bd);background:var(--bg);color:var(--t1);font-size:12px"/>
      <input id="nch_name" placeholder="Channel Name" style="flex:1;padding:6px 10px;border-radius:6px;border:1px solid var(--bd);background:var(--bg);color:var(--t1);font-size:12px"/>
      <button class="btn btn-p" onclick="addCh()">Add Channel</button>
    </div>
  </div>`;
}
async function addCh(){
  const id=document.getElementById('nch_id').value.trim().toLowerCase().replace(/[^a-z0-9-]/g,'-');
  const name=document.getElementById('nch_name').value.trim();
  if(!id||!name){alert('Both ID and name are required');return}
  await fetch(qs(A+'/api/dashboard/channels'),{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({id,name})});
  await loadChannels();
  pSt();
}
async function delCh(id){
  if(!confirm('Delete channel "'+id+'"? Data will remain but will not be accessible.'))return;
  await fetch(qs(A+'/api/dashboard/channels/'+id),{method:'DELETE'});
  await loadChannels();
  if(CH===id){CH='default';localStorage.setItem('ft_channel','default')}
  pSt();
}

// Init: load channels then show overview
(async function(){
  await loadChannels();
  go('overview');
})();
</script>
